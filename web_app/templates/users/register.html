{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>Create Account</h1>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="auth-btn">
                Register
            </button>
        </form>

        <p class="auth-link">
            Already have an account?
            <a href="{% url 'login' %}">
                Login
            </a>
        </p>

    </div>

</div>

{% endblock %}
