{% extends "base.html" %}

{% block content %}

<section class="training">

    <div class="training-header">

        <h1>Training Session</h1>

        <p>Current Session</p>

        <div id="timer">
            00:00:00
        </div>

    </div>

    <div class="training-grid">

        <div class="training-card">
            <h3>Total Shots</h3>
            <span id="total">0</span>
        </div>

        <div class="training-card">
            <h3>Accuracy</h3>
            <span id="accuracy">0%</span>
        </div>

        <div class="training-card">
            <h3>Made Shots</h3>
            <span id="made">0</span>
        </div>

        <div class="training-card">
            <h3>Missed Shots</h3>
            <span id="missed">0</span>
        </div>

        <div class="training-card">
            <h3>Current Streak</h3>
            <span id="current_streak">0</span>
        </div>

        <div class="training-card">
            <h3>Best Streak</h3>
            <span id="best_streak">0</span>
        </div>

    </div>

    <div class="progress-container">

        <h3>Accuracy Progress</h3>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

    </div>

    <div class="training-buttons">

        <form method="POST" action="{% url 'end_session' session.id %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary">
                End Training
            </button>
        </form>

    </div>

</section>

<script>
    const startTime = new Date("{{ session.start_time|date:'c' }}");

    function updateTimer() {
        const now = new Date();
        const elapsed = Math.floor((now - startTime) / 1000);

        const hours = String(Math.floor(elapsed / 3600)).padStart(2, '0');
        const minutes = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
        const seconds = String(elapsed % 60).padStart(2, '0');

        document.getElementById('timer').textContent = `${hours}:${minutes}:${seconds}`;
    }

    setInterval(updateTimer, 1000);
    updateTimer();

    function fetchLiveStats() {
        fetch(`/api/session/{{ session.id }}/stats/`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('total').textContent = data.total_shots;
                document.getElementById('made').textContent = data.made_shots;
                document.getElementById('missed').textContent = data.missed_shots;
                document.getElementById('accuracy').textContent = data.shooting_percentage + '%';
                document.getElementById('current_streak').textContent = data.current_streak;
                document.getElementById('best_streak').textContent = data.best_streak;

                const progressBar = document.querySelector('.progress-fill');
                if (progressBar) {
                    progressBar.style.width = data.shooting_percentage + '%';
                }
            })
            .catch(error => console.error("Error:", error));
    }

    fetchLiveStats();
    setInterval(fetchLiveStats, 1500);
</script>

{% endblock %}
